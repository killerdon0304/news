<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>News Reels Pro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0d1117;
      color: white;
    }

    .card {
      background: #161b22;
      border-radius: 15px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(0,255,255,0.2);
    }

    .video-wrapper {
      position: relative;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 40px;
      opacity: 0.7;
      pointer-events: none;
    }

    .title {
      font-weight: bold;
      font-size: 16px;
      color: #c9d1d9;
    }

    .summary {
      font-size: 14px;
      color: #c9d1d9;
    }

    .location {
      font-size: 12px;
      color: #8b949e;
    }

    .btn-sm {
      margin: 3px;
    }
  </style>
</head>
<body>

<div class="container py-4">
  <h2 class="text-center mb-4">🔥 News Reels Pro</h2>
  <div class="row" id="newsContainer"></div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3">
  <div id="toastMsg" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastText">Copied!</div>
      <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function loadData() {
  const res = await fetch('json/deta.json');
  const json = await res.json();

  const container = document.getElementById("newsContainer");

  json.data.forEach(item => {

    const videoUrl = "reel/" + item.id + ".mp4";

    const shareText = `${item.title} - ${item.summary_text}`;

    const col = document.createElement("div");
    col.className = "col-md-4 mb-4";

    col.innerHTML = `
      <div class="card p-3 h-100">

        <div class="video-wrapper">
          <video controls poster="${item.img}"></video>
          <div class="play-icon">▶</div>
        </div>

        <div class="mt-3">
          <div class="title">${item.title}</div>
          <!-- <div class="summary mt-2">${item.summary_text}</div> -->
          <div class="location mt-2">${item.location}</div>

          <div class="mt-3">

            <a href="${videoUrl}" download class="btn btn-success btn-sm">⬇</a>

            <button class="btn btn-primary btn-sm" onclick="copyText(\`${item.title}\`, 'Title Copied')">📋 T</button>

            <button class="btn btn-warning btn-sm" onclick="copyText(\`${item.summary_text}\`, 'Summary Copied')">📝 S</button>

            <button class="btn btn-secondary btn-sm" onclick="copyText(\`${item.location}\`, 'Location Copied')">📍</button>

            <button class="btn btn-success btn-sm" onclick="shareWhatsApp(\`${shareText}\`)">📤</button>

          </div>
        </div>

      </div>
    `;

    // Video src set after load (performance)
    setTimeout(() => {
      col.querySelector("video").src = videoUrl;
    }, 100);

    container.appendChild(col);
  });
}

// Copy with toast
function copyText(text, message) {
  navigator.clipboard.writeText(text).then(() => {
    showToast(message);
  });
}

// WhatsApp share
function shareWhatsApp(text) {
  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
  window.open(url, "_blank");
}

// Toast function
function showToast(message) {
  document.getElementById("toastText").innerText = message;
  const toast = new bootstrap.Toast(document.getElementById("toastMsg"));
  toast.show();
}

loadData();
</script>

</body>
</html>
