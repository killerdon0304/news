name: Daily Python Script Runner

on:
  schedule:
    - cron: "30 9 * * *"   # Every day at 9:30 AM UTC (3:00 PM IST)
  workflow_dispatch:       # Optional: Manual run option

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"  # या आपकी पसंद की Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run your Python script
        run: |
          python data.py   # यहाँ अपनी main script का नाम डालें
